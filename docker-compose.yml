version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance-audit-sandbox-api
    ports:
      - "8000:8000"
    volumes:
      # SQLite 数据库持久化
      - ./data:/app/data
      # 规则集 YAML 文件（挂载到容器内规则目录）
      - ./src/engine/rules:/app/src/engine/rules
    environment:
      - DATABASE_PATH=/app/data/sandbox.db
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s